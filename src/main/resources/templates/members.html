<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 목록</title>
    <link rel="stylesheet" th:href="@{/css/member.css}">
</head>
<body>
<main class="shell">
    <section class="card list-header">
        <div>
            <p class="eyebrow">Directory</p>
            <h1>등록된 회원 목록</h1>
        </div>
        <a class="primary-button" th:href="@{/members/new-form}">회원 추가</a>
    </section>

    <section class="card">
        <div th:if="${#lists.isEmpty(members)}" class="empty-state">
            <h2>등록된 회원이 없습니다.</h2>
            <p>첫 회원을 등록해서 목록을 채워보세요.</p>
        </div>

        <div th:unless="${#lists.isEmpty(members)}" class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>이메일</th>
                    <th>이름</th>
                    <th>나이</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="member : ${members}">
                    <td th:text="${member.id}"></td>
                    <td th:text="${member.email}"></td>
                    <td th:text="${member.name}"></td>
                    <td th:text="${member.age}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
