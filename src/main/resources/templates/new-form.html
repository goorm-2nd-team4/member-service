<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 등록</title>
    <link rel="stylesheet" th:href="@{/css/member.css}">
</head>
<body>
<main class="shell">
    <section class="hero card">
        <p class="eyebrow">Member Service</p>
        <h1>회원 정보 조회 서비스.</h1>
        <div class="hero-actions">
            <a class="ghost-button" th:href="@{/members}">전체 회원 보기</a>
        </div>
    </section>

    <section class="card form-card">
        <div class="section-heading">
            <p class="section-kicker">Create</p>
            <h2>새 회원 등록</h2>
        </div>

        <form class="member-form" th:action="@{/members/save}" method="post">
            <label>
                <span>이메일</span>
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>

            <label>
                <span>비밀번호</span>
                <input type="password" name="password" placeholder="8자 이상 입력" required>
            </label>

            <label>
                <span>이름</span>
                <input type="text" name="name" placeholder="홍길동" required>
            </label>

            <label>
                <span>나이</span>
                <input type="number" name="age" min="0" placeholder="25" required>
            </label>

            <button class="primary-button" type="submit">회원 저장</button>
        </form>
    </section>
</main>
</body>
</html>
